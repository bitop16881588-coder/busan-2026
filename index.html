        .tiled-content { display: flex; gap: 30px; width: 100%; align-items: stretch; }

        tr:nth-child(even) { background: #fdfdfd; }

        .bleed-text-side { padding: 80px 60px; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .bleed-image-side { width: 100%; height: 720px; object-fit: cover; }
        .timeline-layout { display: flex; justify-content: space-between; position: relative; padding-top: 100px; }
        .timeline-line { position: absolute; top: 150px; left: 0; width: 100%; height: 4px; background: #e2e8f0; z-index: 0; }
        .timeline-item { width: 18%; text-align: center; position: relative; z-index: 1; }
        .timeline-item::after { content: ""; position: absolute; top: 41px; left: 50%; transform: translateX(-50%); width: 25px; height: 25px; background: var(--accent-gold); border-radius: 50%; border: 5px solid #fff; }

        .btn-map { display: inline-block; background: var(--primary-navy); color: #fff; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-size: 14px; font-weight: bold; transition: background 0.2s; margin-top: 5px; }
        .btn-map:hover { background: var(--accent-gold); color: var(--primary-navy); }
